services:
  wanz-prase2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wanz-prase2-001
    image: wanz-prase2-001:latest
    restart: always
    network_mode: host
    volumes:
      # 挂载配置文件，支持热更新配置
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      # 挂载日志目录，持久化日志
      - ./logs:/app/logs
      # 挂载 PDF 原始目录，持久化上传的 PDF（VL 抽取 / PDF 预览依赖，务必持久化，否则容器重建即丢）
      - ./uploads:/app/uploads
      # 挂载数据目录（预留，当前代码未写入此目录）
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5019/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
