<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式处理演示 - PDF 文档智能处理系统</title>
    <link rel="stylesheet" href="css/stream-demo.css">
</head>
<body>
    <!-- Background decoration -->
    <div class="bg-decoration">
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header glass-card">
            <div class="header-left">
                <h1>流式处理演示</h1>
                <span class="header-badge">Stream Demo</span>
            </div>
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
                </svg>
                返回主页
            </a>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left: Upload Panel -->
            <section class="upload-panel glass-card">
                <h2 class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    上传文件
                </h2>

                <div id="upload-area" class="upload-area">
                    <div class="upload-area-inner">
                        <div class="upload-icon-wrapper">
                            <svg class="upload-icon-main" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="12" y1="18" x2="12" y2="12"/>
                                <polyline points="9 15 12 12 15 15"/>
                            </svg>
                        </div>
                        <p class="upload-text">拖拽 PDF 文件到此处</p>
                        <p class="upload-hint">或点击选择文件 (仅支持 .pdf)</p>
                        <input type="file" id="file-input" accept=".pdf" hidden>
                    </div>
                </div>

                <!-- File Info (shown after selection) -->
                <div id="file-info" class="file-info" style="display: none;">
                    <div class="file-info-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                    </div>
                    <div class="file-info-detail">
                        <span id="file-name" class="file-info-name"></span>
                        <span id="file-size" class="file-info-size"></span>
                    </div>
                    <button id="remove-file" class="file-info-remove" title="移除文件">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>

                <button id="start-btn" class="start-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    开始流式处理
                </button>
            </section>

            <!-- Right: Pipeline Visualization -->
            <section class="pipeline-panel glass-card">
                <h2 class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    处理管线
                </h2>

                <!-- Pipeline Stages -->
                <div id="pipeline-stages" class="pipeline-stages">
                    <div class="pipeline-stage" data-stage="parsing">
                        <div class="stage-indicator">
                            <div class="stage-dot"></div>
                            <div class="stage-line"></div>
                        </div>
                        <div class="stage-content">
                            <div class="stage-header">
                                <span class="stage-name">MinerU 解析</span>
                                <span class="stage-status"></span>
                            </div>
                            <div class="stage-detail"></div>
                            <div class="stage-progress-bar"><div class="stage-progress-fill"></div></div>
                        </div>
                    </div>
                    <div class="pipeline-stage" data-stage="chunking">
                        <div class="stage-indicator">
                            <div class="stage-dot"></div>
                            <div class="stage-line"></div>
                        </div>
                        <div class="stage-content">
                            <div class="stage-header">
                                <span class="stage-name">文档分块</span>
                                <span class="stage-status"></span>
                            </div>
                            <div class="stage-detail"></div>
                            <div class="stage-progress-bar"><div class="stage-progress-fill"></div></div>
                        </div>
                    </div>
                    <div class="pipeline-stage" data-stage="embedding">
                        <div class="stage-indicator">
                            <div class="stage-dot"></div>
                            <div class="stage-line"></div>
                        </div>
                        <div class="stage-content">
                            <div class="stage-header">
                                <span class="stage-name">向量化</span>
                                <span class="stage-status"></span>
                            </div>
                            <div class="stage-detail"></div>
                            <div class="stage-progress-bar"><div class="stage-progress-fill"></div></div>
                        </div>
                    </div>
                    <div class="pipeline-stage" data-stage="extracting">
                        <div class="stage-indicator">
                            <div class="stage-dot"></div>
                            <div class="stage-line"></div>
                        </div>
                        <div class="stage-content">
                            <div class="stage-header">
                                <span class="stage-name">字段提取</span>
                                <span class="stage-status"></span>
                            </div>
                            <div class="stage-detail"></div>
                            <div class="stage-progress-bar"><div class="stage-progress-fill"></div></div>
                        </div>
                    </div>
                    <div class="pipeline-stage" data-stage="analyzing">
                        <div class="stage-indicator">
                            <div class="stage-dot"></div>
                            <div class="stage-line"></div>
                        </div>
                        <div class="stage-content">
                            <div class="stage-header">
                                <span class="stage-name">逻辑分析</span>
                                <span class="stage-status"></span>
                            </div>
                            <div class="stage-detail"></div>
                            <div class="stage-progress-bar"><div class="stage-progress-fill"></div></div>
                        </div>
                    </div>
                </div>

                <!-- Overall Progress -->
                <div id="overall-progress" class="overall-progress" style="display: none;">
                    <div class="overall-progress-header">
                        <span class="overall-label">总进度</span>
                        <span id="overall-percent" class="overall-percent">0%</span>
                    </div>
                    <div class="overall-bar">
                        <div id="overall-fill" class="overall-fill"></div>
                    </div>
                </div>

                <!-- Completion Banner -->
                <div id="completion-banner" class="completion-banner" style="display: none;">
                    <div class="completion-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <span class="completion-text">处理完成</span>
                </div>

                <!-- Error Banner -->
                <div id="error-banner" class="error-banner" style="display: none;">
                    <div class="error-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                    </div>
                    <span id="error-text" class="error-text"></span>
                </div>
            </section>
        </div>

        <!-- Event Log -->
        <section class="log-panel glass-card">
            <div class="log-header">
                <h2 class="panel-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    事件日志
                </h2>
                <button id="clear-log" class="clear-log-btn" title="清空日志">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    清空
                </button>
            </div>
            <div id="log-container" class="log-container">
                <div class="log-empty">等待处理开始...</div>
            </div>
        </section>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/stream-demo.js"></script>
</body>
</html>
